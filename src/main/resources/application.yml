spring:
  application:
    name: config-server
  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: https://github.com/misharasandalidesilva/Clothing-shop-configurations.git
          default-label: main
          clone-on-start: true
          search-paths: platform,services
        native:
          search-locations:
            - classpath:/configurations
            - file:./configurations/platform
            - file:./configurations/services

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info